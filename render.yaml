databases:
  - name: subdivision-db
    plan: free
    databaseName: subdivision
    user: subdivision_user

services:
  - type: web
    name: subdivision-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    preDeployCommand: php artisan optimize:clear && php artisan migrate --force && php artisan db:seed --force
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "true"
      - key: APP_URL
        value: https://resident-qr.onrender.com
      - key: ASSET_URL
        value: https://resident-qr.onrender.com
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: debug

      - key: SESSION_DRIVER
        value: file
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: SESSION_DOMAIN
        value: ""

      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync

      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: subdivision-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: subdivision-db
          property: port
      - key: DB_SSLMODE
        value: require
      - key: DB_DATABASE
        fromDatabase:
          name: subdivision-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: subdivision-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: subdivision-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: subdivision-db
          property: connectionString

      - key: JWT_ISSUER
        value: subdivision-gate
      - key: JWT_AUDIENCE
        value: guard-app
      - key: JWT_SECRET
        sync: false
      - key: SANCTUM_STATEFUL_DOMAINS
        value: resident-qr.onrender.com
