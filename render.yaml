databases:
  - name: subdivision-db
    plan: free
    databaseName: subdivision
    user: subdivision_user

services:
  - type: web
    name: subdivision-backend
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    preDeployCommand: php artisan optimize:clear && php artisan migrate --force && php artisan db:seed
    dockerCommand: php artisan serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: ASSET_URL
        sync: false
      - key: FORCE_HTTPS
        value: "true"
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: SESSION_DRIVER
          value: file
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: SESSION_DOMAIN
        value: ""
      - key: CACHE_STORE
          value: file
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: subdivision-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: subdivision-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: subdivision-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: subdivision-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: subdivision-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: subdivision-db
          property: connectionString
