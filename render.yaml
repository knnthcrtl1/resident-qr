databases:
  - name: subdivision-db
    plan: free
    databaseName: subdivision
    user: subdivision_user

services:
  - type: web
    name: subdivision-backend
    runtime: docker
    rootDir: backend
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    preDeployCommand: php artisan migrate --force
    dockerCommand: php artisan serve --host 0.0.0.0 --port $PORT
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: subdivision-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: subdivision-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: subdivision-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: subdivision-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: subdivision-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: subdivision-db
          property: connectionString

  - type: worker
    name: subdivision-queue-worker
    runtime: docker
    rootDir: backend
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    dockerCommand: php artisan queue:work --sleep=3 --tries=3 --timeout=90
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: subdivision-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: subdivision-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: subdivision-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: subdivision-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: subdivision-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: subdivision-db
          property: connectionString
